name: CI/CD GreenCityUser

concurrency: Testing

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]
  workflow_dispatch:

env:
  repository: user
  userRepoName: core
  onbootJarName: app.jar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build, test & run Sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          git fetch --unshallow || true
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=GreenCity-UA-4146-4625-01_GreenCityUser21 \
            -Dsonar.organization=greencity-ua-4146-4625-01 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=src/main/java/greencity \
            -Dsonar.binaries=target/classes \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Test Reporter
        uses: dorny/test-reporter@v1.5.0
        if: success() || failure()
        with:
          name: Tests Report
          path: "**/target/surefire-reports/*.xml"
          reporter: java-junit

      - name: Rename user jar to app
        run: mv $userRepoName/target/*.jar $userRepoName/target/$onbootJarName

      - name: Set short SHA for further steps
        run: echo "GITHUB_SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # - name: Deploy 🚀
      #   if: ${{ github.event_name == 'push' }}
      #   uses: JamesIves/github-pages-deploy-action@3.7.1
      #   with:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     BRANCH: gh-pages
      #     FOLDER: .
      #     CLEAN: true


